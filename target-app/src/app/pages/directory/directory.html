<div class="directory-page">
  <header class="page-header">
    <div class="header-text">
      <h2 nz-typography>Directorio</h2>
      <p class="subtitle">Todas las personas de la organización</p>
    </div>
    <span class="count">{{ filteredPeople().length }} personas</span>
  </header>

  <div class="filter-bar">
    <nz-select
      [ngModel]="selectedArea()"
      (ngModelChange)="selectedArea.set($event)"
      nzPlaceHolder="Área"
    >
      <nz-option nzValue="Todas" nzLabel="Todas"></nz-option>
      @for (area of areas; track area) {
        <nz-option [nzValue]="area" [nzLabel]="area"></nz-option>
      }
    </nz-select>
  </div>

  <nz-table
    #table
    [nzData]="filteredPeople()"
    [nzShowPagination]="false"
    [nzBordered]="false"
    nzSize="middle"
  >
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Área</th>
        <th>Rol</th>
      </tr>
    </thead>
    <tbody>
      @for (person of table.data; track person.id) {
        <tr>
          <td class="name-cell">{{ person.name }}</td>
          <td>
            <nz-tag [nzColor]="areaColor(person.area)">{{ person.area }}</nz-tag>
          </td>
          <td>{{ person.role }}</td>
        </tr>
      }
    </tbody>
  </nz-table>
</div>
