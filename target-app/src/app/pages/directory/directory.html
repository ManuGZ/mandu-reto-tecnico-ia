<div class="directory-page">
  <header class="page-header">
    <div class="header-text">
      <h2 nz-typography>Directorio</h2>
      <p class="subtitle">Todas las personas de la organización</p>
    </div>
  </header>

  <nz-tabs>
    <nz-tab nzTitle="Colaboradores">
      <app-people-table
        [people]="allPeople"
        [selectedId]="selectedPerson()?.id ?? null"
        (personSelected)="selectPerson($event)"
      />
    </nz-tab>
    <nz-tab nzTitle="Managers">
      <app-people-table
        [people]="managers()"
        [selectedId]="selectedPerson()?.id ?? null"
        (personSelected)="selectPerson($event)"
      />
    </nz-tab>
  </nz-tabs>

  <nz-drawer
    [nzVisible]="!!selectedPerson()"
    nzPlacement="right"
    [nzWidth]="380"
    nzTitle="Detalle de la persona"
    (nzOnClose)="closeDetail()"
  >
    <ng-container *nzDrawerContent>
      @if (selectedPerson(); as person) {
        <app-person-detail [person]="person" [areaColor]="areaColor(person.area)" />
      }
    </ng-container>
  </nz-drawer>
</div>
