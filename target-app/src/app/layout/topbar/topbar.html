    <!-- Usuario -->
    <div class="header-button header-button-profile" [ngClass]="{'active-user-menu': profileOpen}">
      <div class="user-menu"
        (nzVisibleChange)="onProfileVisibleChange($event)"
        nz-dropdown nzTrigger="click"
        [nzDropdownMenu]="menuAccount"
        nzPlacement="bottomRight">
        <div class="user-avatar-initials">{{ user.initials }}</div>
        <p class="user-name">{{ user.name }}</p>
        <img class="chevron-down" src="assets/icons/navbar/chevron.svg" alt="chevron">
      </div>

      <nz-dropdown-menu #menuAccount="nzDropdownMenu">
        <ul nz-menu class="header-profile-box">
          <div class="header-profile-box-data">
            <div class="user-avatar-initials user-avatar-initials--large">{{ user.initials }}</div>
            <div>
              <h3>{{ user.name }}</h3>
              <p>{{ user.email }}</p>
            </div>
          </div>
          <div class="header-profile-box-options">
            <nz-divider></nz-divider>
            <div class="header-profile-box-options-data">
              <li nz-menu-item><a>Mi perfil</a></li>
              <li nz-menu-item><a>Mi cuenta</a></li>
            </div>
            <nz-divider></nz-divider>
            <div class="header-profile-box-options-data">
              <li nz-menu-item><a>Cerrar sesión</a></li>
            </div>
          </div>
        </ul>
      </nz-dropdown-menu>
    </div>

    <!-- Logo empresa -->
    <img class="company-logo" src="assets/imgs/navbar/company-logo.svg" alt="Company Logo">
  </section>
</nav>
